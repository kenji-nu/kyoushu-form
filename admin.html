<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理画面 | 静岡県自動車学校 沼津校</title>
<style>
:root{--g:#1D9E75;--gl:#E1F5EE;--gd:#085041;--b:#185FA5;--bl:#E6F1FB;--bd:#042C53;--pl:#EEEDFE;--pd:#26215C;--yl:#FFF3CD;--yd:#7D4E00;--red:#A32D2D;--bg:#f5f7f9;--card:#fff;--border:#e2e6ea;--t:#111;--t2:#666;--t3:#bbb;--r:10px;--sh:0 2px 12px rgba(0,0,0,.07)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg);color:var(--t)}
.page{max-width:560px;margin:0 auto;padding:.75rem}
.screen{display:none}.screen.active{display:block}
.hdr{display:flex;align-items:center;gap:11px;margin-bottom:1.25rem;padding:.875rem 1.125rem;background:var(--card);border-radius:var(--r);box-shadow:var(--sh)}
.hi{width:40px;height:40px;border-radius:50%;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.hs{font-size:11px;color:var(--t2)}.ht{font-size:15px;font-weight:600}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:1.125rem;margin-bottom:.875rem}
.fl{font-size:12px;color:var(--t2);display:block;margin-bottom:4px;font-weight:500}
.er{font-size:12px;color:var(--red);margin-top:4px;display:none}
.btn{width:100%;padding:12px;border-radius:8px;background:var(--g);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.87}
.alw{text-align:center;padding:1.5rem 0}
.alw h2{font-size:16px;font-weight:700;margin-bottom:.5rem}
.alw p{font-size:13px;color:var(--t2);margin-bottom:1.25rem}
.pr{display:flex;gap:8px}
.pr input{flex:1;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:15px;background:var(--card)}
.pr input:focus{outline:none;border-color:var(--g)}
.pr button{padding:10px 16px;border-radius:8px;background:var(--g);color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer}
.sts{display:flex;gap:7px;margin-bottom:1rem;flex-wrap:wrap}
.st{background:var(--card);border-radius:8px;padding:.625rem .875rem;flex:1;min-width:68px;box-shadow:var(--sh)}
.sn{font-size:20px;font-weight:700}.sl3{font-size:11px;color:var(--t2);margin-top:1px}
.srt{display:flex;gap:5px;margin-bottom:1rem;flex-wrap:wrap}
.sb2{padding:6px 12px;font-size:12px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--t2);cursor:pointer;font-weight:500}
.sb2.on{background:var(--bg);color:var(--t);border-color:#aaa;font-weight:600}
.gl2{font-size:12px;font-weight:600;color:var(--t2);padding:5px 0 3px;border-bottom:1px solid var(--border);margin-bottom:7px;margin-top:.875rem;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.gl2:first-child{margin-top:0}
.gc{font-size:11px;background:var(--bg);border-radius:9px;padding:1px 7px}
.rc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;margin-bottom:7px}
.rt{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.rn{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.rnm{font-size:14px;font-weight:600}
.rid{font-size:12px;font-weight:700;color:var(--b);background:var(--bl);border-radius:5px;padding:1px 7px;letter-spacing:.08em}
.ron{font-size:11px;color:var(--t3);background:var(--bg);border-radius:9px;padding:1px 7px}
.rv{display:inline-flex;font-size:11px;padding:2px 8px;border-radius:8px;margin-bottom:5px;margin-right:3px;font-weight:500;background:var(--gl);color:var(--gd)}
.tb{display:inline-flex;font-size:11px;padding:2px 8px;border-radius:8px;margin-bottom:5px;font-weight:500}
.tbn{background:var(--gl);color:var(--gd)}.tbr{background:var(--yl);color:var(--yd)}.tbs{background:var(--bl);color:var(--bd)}
.rs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.rch{font-size:11px;padding:2px 8px;border-radius:9px;background:var(--gl);color:var(--gd)}
.rch.hl{background:var(--g);color:#fff}
.rno{font-size:12px;color:var(--t2);margin-bottom:5px}
.rf{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.db{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 9px;border-radius:9px;background:var(--gl);color:var(--gd);font-weight:500}
.cb{font-size:12px;padding:5px 11px;border-radius:7px;border:1px solid var(--border);cursor:pointer;background:var(--bg);font-weight:500}
.cb:hover{border-color:var(--g)}
.rmt{font-size:11px;color:var(--t3);margin-left:auto}
.ld{text-align:center;padding:2rem;color:var(--t2);font-size:13px}
.wn{display:flex;align-items:center;gap:7px;margin-bottom:.75rem}
.wn button{padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--card);font-size:13px;cursor:pointer}
.wn button:hover{background:var(--bg)}.wl{flex:1;text-align:center;font-size:13px;font-weight:600}
.bk{font-size:12px;color:var(--t3);text-align:center;margin-top:.75rem;cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
<div class="page">

<!-- ログイン -->
<div class="screen active" id="sc-login">
  <div class="hdr"><div class="hi">📋</div><div><div class="hs">静岡県自動車学校 沼津校</div><div class="ht">スタッフ管理画面</div></div></div>
  <div class="card">
    <div class="alw">
      <h2>パスワードを入力してください</h2>
      <p>スタッフ専用の管理画面です</p>
      <div class="pr">
        <input type="password" id="pi" placeholder="パスワード" onkeydown="if(event.key==='Enter')chkPw()">
        <button onclick="chkPw()">入る</button>
      </div>
      <div class="er" id="pe" style="text-align:center;margin-top:8px">パスワードが違います</div>
    </div>
  </div>
</div>

<!-- 管理画面 -->
<div class="screen" id="sc-admin">
  <div class="hdr"><div class="hi">📋</div><div><div class="hs">静岡県自動車学校 沼津校 — 管理画面</div><div class="ht">技能教習 申し込み一覧</div></div></div>
  <div style="display:flex;gap:8px;margin-bottom:1rem">
    <button class="sb2 on" id="tab-list" onclick="switchTab('list')">📋 申込一覧</button>
    <button class="sb2" id="tab-slots" onclick="switchTab('slots')">📅 空き枠設定</button>
  </div>
  <div id="admin-list-tab">
    <div class="sts" id="sts"></div>
    <div class="srt">
      <button class="sb2 on" id="s-order" onclick="setSort('order')">申込順</button>
      <button class="sb2" id="s-vehicle" onclick="setSort('vehicle')">車種別</button>
      <button class="sb2" id="s-time" onclick="setSort('time')">時間帯別</button>
      <button class="sb2" id="s-transport" onclick="setSort('transport')">来校方法別</button>
    </div>
    <div id="la"><div class="ld">読み込み中...</div></div>
  </div>
  <div id="admin-slots-tab" style="display:none">
    <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center">
      <label class="fl" style="margin:0">車種：</label>
      <select id="slot-vehicle-sel" onchange="loadSlotEditor()" style="padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;background:var(--card)">
        <option>普通（AT）</option><option>普通（MT）</option><option>大型</option>
        <option>中型</option><option>準中型</option><option>大型二輪</option>
        <option>普通自動二輪（MT）</option><option>普通自動二輪（AT）</option>
        <option>小型二輪（MT）</option><option>小型二輪（AT）</option>
        <option>大型特殊</option><option>牽引</option><option>審査</option>
      </select>
    </div>
    <div class="wn">
      <button onclick="slotPrevWeek()">‹ 前の週</button>
      <span class="wl" id="slot-wlabel"></span>
      <button onclick="slotNextWeek()">次の週 ›</button>
    </div>
    <div style="overflow-x:auto;margin-bottom:1rem"><div id="slot-grid"></div></div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:1rem">✅ = 空きあり　　❌ = 受付終了　　タップで切り替え</div>
  </div>
  <div class="bk" onclick="show('sc-login')">← ログアウト</div>
</div>

</div>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyGrirp12D499FcoWuRFiIn0brdW5LQVsPe8SEGd0HIlHBd5Fe9DEBVFIO7lGaCxyUy/exec';
const ADMIN_PW = 'numazu7171';
const TM = ['1限 8:30〜9:20','2限 9:30〜10:20','3限 10:30〜11:20','4限 11:30〜12:20','5限 12:30〜13:20','6限 13:30〜14:20','7限 14:30〜15:20','8限 15:30〜16:20','9限 16:30〜17:20','10限 17:40〜18:30','11限 18:40〜19:30','12限 19:40〜20:30'];
const DN = ['日','月','火','水','木','金','土'];

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function chkPw(){
  const p=document.getElementById('pi').value;
  if(p===ADMIN_PW){document.getElementById('pe').style.display='none';showAdmin();}
  else{document.getElementById('pe').style.display='block';}
}

function switchTab(tab){
  document.getElementById('admin-list-tab').style.display=tab==='list'?'block':'none';
  document.getElementById('admin-slots-tab').style.display=tab==='slots'?'block':'none';
  document.getElementById('tab-list').classList.toggle('on',tab==='list');
  document.getElementById('tab-slots').classList.toggle('on',tab==='slots');
  if(tab==='slots')loadSlotEditor();
}

let AD=[],srt='order';
async function showAdmin(){
  show('sc-admin');
  switchTab('list');
  document.getElementById('la').innerHTML='<div class="ld">読み込み中...</div>';
  try{
    const res=await fetch(`${GAS_URL}?action=getEntries`);
    const data=await res.json();
    AD=data.entries||[];
  }catch(e){AD=[];}
  if(AD.length===0){
    document.getElementById('la').innerHTML='<div class="ld">申込はまだありません</div>';
    document.getElementById('sts').innerHTML='<div class="st"><div class="sn">0</div><div class="sl3">総申込</div></div>';
    return;
  }
  rAdmin();
}

function setSort(m){
  srt=m;
  ['order','vehicle','time','transport'].forEach(x=>document.getElementById('s-'+x).classList.toggle('on',x===m));
  rAdmin();
}
function dO(s){const m=s.match(/(\d+)\/(\d+)/);return m?+m[1]*100+ +m[2]:999;}
function tO(s){const m=s.match(/(\d+)限/);return m?+m[1]:999;}

async function markDone(id){
  try{await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'markDone',id})});}catch(e){}
  const e=AD.find(d=>d.id===id);if(e){e.done=true;e.status='confirmed';}
  rAdmin();
}
async function markDoneWithModal(id){
  await markDone(id);
  const confirmed=AD.find(d=>d.id===id);
  if(!confirmed||!confirmed.slots)return;
  const confirmedSlots=confirmed.slots.split('、');
  const targets=AD.filter(d=>{
    if(d.id===id)return false;
    if(d.status==='confirmed'||d.status==='rejected')return false;
    if(!d.slots)return false;
    return confirmedSlots.some(s=>d.slots.split('、').includes(s));
  });
  if(targets.length===0){rAdmin();return;}
  showModal('conflict-modal','同じ枠のエントリー者','以下の方は同じ枠をエントリーしています。<br>「今回はご案内できませんでした」に変更しますか？',targets,`rejectAll([${targets.map(d=>d.id).join(',')}])`,'まとめて変更する','#1D9E75');
}
async function markReject(id){
  try{await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'markReject',id})});}catch(e){}
  const e=AD.find(d=>d.id===id);if(e){e.status='rejected';}
  rAdmin();
}
async function markPending(id){
  try{await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'markPending',id})});}catch(e){}
  const e=AD.find(d=>d.id===id);if(e){e.status='pending';e.done=false;}
  rAdmin();
}
async function cancelConfirmed(id){
  if(!confirm('予約を取り消して「ご案内不可」にしますか？'))return;
  try{await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'markReject',id})});}catch(e){}
  const e=AD.find(d=>d.id===id);if(e){e.status='rejected';e.done=false;}
  rAdmin();
}
async function rejectAll(ids){
  closeModal('conflict-modal');
  for(const id of ids){await markReject(id);}
  rAdmin();
}
function batchReject(slotKey){
  const targets=AD.filter(d=>{if(d.status==='confirmed'||d.status==='rejected')return false;if(!d.slots)return false;return d.slots.split('、').includes(slotKey);});
  if(targets.length===0){alert('対象のエントリー者はいません');return;}
  showModal('batch-modal','この枠を一括でご案内不可にする','以下の方を「今回はご案内できませんでした」に変更します。<br>後から個別・一括で「未対応に戻す」もできます。',targets,`batchRejectAll([${targets.map(d=>d.id).join(',')}])`,'一括実行する','#A32D2D');
}
async function batchRejectAll(ids){
  closeModal('batch-modal');
  for(const id of ids){await markReject(id);}
  rAdmin();
}
function batchPending(slotKey){
  const targets=AD.filter(d=>{if(d.status!=='rejected')return false;if(!d.slots)return false;return d.slots.split('、').includes(slotKey);});
  if(targets.length===0){alert('戻す対象のエントリー者はいません');return;}
  showModal('batch-pending-modal','一括で未対応に戻す','以下の方を「未対応」に戻します。',targets,`batchPendingAll([${targets.map(d=>d.id).join(',')}])`,'一括で戻す','#1D9E75');
}
async function batchPendingAll(ids){
  closeModal('batch-pending-modal');
  for(const id of ids){await markPending(id);}
  rAdmin();
}

function showModal(modalId,title,desc,targets,execFn,btnLabel,btnColor){
  const cards=targets.map(d=>`<div style="background:#f5f7f9;border-radius:8px;padding:.75rem 1rem;margin-bottom:8px;font-size:13px"><div style="font-weight:600;margin-bottom:3px">${d.name} <span style="font-size:11px;color:#185FA5;background:#E6F1FB;border-radius:4px;padding:1px 6px">${d.studentId}</span></div><div style="font-size:11px;color:#666">${d.slots||''}</div></div>`).join('');
  const overlay=document.createElement('div');
  overlay.id=modalId;
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem';
  overlay.innerHTML=`<div style="background:#fff;border-radius:12px;padding:1.5rem;max-width:400px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,.15)"><div style="font-size:15px;font-weight:700;margin-bottom:.5rem">${title}</div><div style="font-size:13px;color:#666;margin-bottom:1rem;line-height:1.6">${desc}</div>${cards}<div style="display:flex;gap:8px;margin-top:1rem"><button onclick="closeModal('${modalId}')" style="flex:1;padding:10px;border-radius:8px;border:1px solid #e2e6ea;background:#f5f7f9;font-size:13px;font-weight:600;cursor:pointer">キャンセル</button><button onclick="${execFn}" style="flex:1;padding:10px;border-radius:8px;background:${btnColor};color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer">${btnLabel}</button></div></div>`;
  document.body.appendChild(overlay);
}
function closeModal(id){const e=document.getElementById(id);if(e)e.remove();}

function rAdmin(){
  const total=AD.length,pending=AD.filter(d=>!d.done&&d.status!=='rejected').length;
  const rejected=AD.filter(d=>d.status==='rejected').length;
  const confirmed=AD.filter(d=>d.status==='confirmed').length;
  document.getElementById('sts').innerHTML=`
    <div class="st"><div class="sn">${total}</div><div class="sl3">総申込</div></div>
    <div class="st"><div class="sn" style="color:var(--red)">${pending}</div><div class="sl3">未対応</div></div>
    <div class="st"><div class="sn" style="color:var(--gd)">${confirmed}</div><div class="sl3">予約確定</div></div>
    <div class="st"><div class="sn" style="color:var(--t3)">${rejected}</div><div class="sl3">ご案内不可</div></div>
  `;
  const area=document.getElementById('la');area.innerHTML='';
  if(AD.length===0){area.innerHTML='<div class="ld">申込はまだありません</div>';return;}
  if(srt==='order'){[...AD].sort((a,b)=>a.id-b.id).forEach((d,i)=>area.appendChild(mkC(d,i+1,null)));}
  else if(srt==='vehicle'){
    const vs=[...new Set(AD.map(d=>d.vehicle))];
    vs.forEach(v=>{const g=AD.filter(d=>d.vehicle===v);if(!g.length)return;area.appendChild(mkG(`🚗 ${v}`,g.length,null));g.forEach((d,i)=>area.appendChild(mkC(d,i+1,null)));});
  }else if(srt==='time'){
    const map={};
    AD.forEach(d=>{if(!d.slots)return;d.slots.split('、').forEach(s=>{if(!map[s])map[s]=[];map[s].push(d);});});
    Object.keys(map).sort((a,b)=>dO(a)!==dO(b)?dO(a)-dO(b):tO(a)-tO(b)).forEach(k=>{
      area.appendChild(mkG(`🕐 ${k}`,map[k].length,k));
      map[k].forEach(d=>area.appendChild(mkC(d,null,k)));
    });
  }else{
    [['送迎バス希望（新規）','🚌 送迎バス希望（新規）'],['送迎バス予約済み','🚌 送迎バス予約済み'],['自力で来校','🚶 自力で来校']].forEach(([t,l])=>{
      const g=AD.filter(d=>d.transport===t);if(!g.length)return;
      area.appendChild(mkG(l,g.length,null));g.forEach((d,i)=>area.appendChild(mkC(d,i+1,null)));
    });
  }
}

function mkG(h,c,slotKey){
  const el=document.createElement('div');el.className='gl2';
  const batchBtns=slotKey?`<button style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid #f5c6c6;background:#fff5f5;color:var(--red);cursor:pointer;font-weight:500" onclick="batchReject('${slotKey}')">一括でご案内不可</button><button style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid #e2e6ea;background:#f5f7f9;color:#666;cursor:pointer;font-weight:500" onclick="batchPending('${slotKey}')">一括で未対応に戻す</button>`:'';
  el.innerHTML=`${h}<span class="gc">${c}名</span>${batchBtns}`;
  return el;
}

function mkC(d,n,hl){
  const card=document.createElement('div');card.className='rc';
  const tC=d.transport&&d.transport.includes('希望')?'tbn':d.transport&&d.transport.includes('予約済み')?'tbr':'tbs';
  const bi=d.busStop?` / ${d.busStop}`:'';
  const slotArr=d.slots?d.slots.split('、'):[];
  const chips=slotArr.map(s=>`<span class="rch${hl&&s===hl?' hl':''}">${s}</span>`).join('');
  let footerBtn='';
  if(d.status==='confirmed'){
    footerBtn=`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><div class="db">✓ 予約確定</div><button class="cb" style="font-size:11px;padding:3px 10px;color:var(--red);border-color:#f5c6c6" onclick="cancelConfirmed(${d.id})">予約取り消し</button></div>`;
  }else if(d.status==='rejected'){
    footerBtn=`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><div style="font-size:11px;padding:2px 9px;border-radius:9px;background:#f5f5f5;color:var(--t3);font-weight:500">今回はご案内できませんでした</div><button class="cb" style="font-size:11px;padding:3px 10px" onclick="markPending(${d.id})">↩ 未対応に戻す</button></div>`;
  }else{
    footerBtn=`<div style="display:flex;gap:6px;flex-wrap:wrap"><button class="cb" onclick="markDoneWithModal(${d.id})">📞 予約確定</button><button class="cb" style="color:var(--red);border-color:#f5c6c6" onclick="markReject(${d.id})">今回はご案内できませんでした</button></div>`;
  }
  card.innerHTML=`
    <div class="rt"><div class="rn"><span class="rnm">${d.name}</span><span class="rid">${d.studentId}</span></div>${n!==null?`<span class="ron">#${n}</span>`:`<span class="rmt">${d.submittedAt}</span>`}</div>
    <span class="rv">🚗 ${d.vehicle}</span>
    <span class="tb ${tC}">${d.transport||''}${bi}</span>
    <div class="rs">${chips}</div>
    ${d.note?`<div class="rno">💬 ${d.note}</div>`:''}
    <div class="rf">${footerBtn}${n===null?`<span class="rmt">${d.submittedAt}</span>`:''}</div>`;
  return card;
}

// 空き枠設定
let slotWo=0,slotData2={};
function getWD2(o){
  const t=new Date(),d=t.getDay(),m=new Date(t);
  m.setDate(t.getDate()-(d===0?6:d-1)+o*7);
  return Array.from({length:7},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x;});
}
function fmt2(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

async function loadSlotEditor(){
  const vehicle=document.getElementById('slot-vehicle-sel').value;
  const dates=getWD2(slotWo);
  const f=d=>`${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('slot-wlabel').textContent=`${f(dates[0])}（月）〜 ${f(dates[6])}（日）`;
  try{
    const res=await fetch(`${GAS_URL}?action=getSlots&from=${fmt2(dates[0])}&to=${fmt2(dates[6])}&vehicle=${encodeURIComponent(vehicle)}`);
    const data=await res.json();
    slotData2=data.slots||{};
  }catch(e){slotData2={};}
  renderSlotGrid(vehicle,dates);
}

function renderSlotGrid(vehicle,dates){
  const g=document.getElementById('slot-grid');
  g.style.cssText='display:grid;grid-template-columns:52px repeat(7,1fr);gap:3px;min-width:400px';
  g.innerHTML='';
  const today=new Date();
  const th=document.createElement('div');th.style.cssText='font-size:10px;color:var(--t2)';g.appendChild(th);
  dates.forEach(d=>{
    const h=document.createElement('div');
    h.style.cssText=`font-size:11px;font-weight:600;text-align:center;padding:4px 2px;color:${d.toDateString()===today.toDateString()?'var(--b)':'var(--t2)'};border-bottom:1px solid var(--border)`;
    h.textContent=`${DN[d.getDay()]} ${d.getDate()}`;g.appendChild(h);
  });
  TM.forEach(t=>{
    const tl=document.createElement('div');
    tl.style.cssText='font-size:10px;color:var(--t3);text-align:right;padding-right:4px;padding-top:6px;line-height:1.3';
    tl.textContent=t.split(' ')[0];g.appendChild(tl);
    dates.forEach(d=>{
      const key=`${fmt2(d)}_${t}`,isOpen=!!slotData2[key];
      const btn=document.createElement('button');
      btn.style.cssText=`height:34px;border-radius:4px;font-size:13px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;width:100%;${isOpen?'background:var(--gl);border-color:#5DCAA5':'background:var(--bg);color:var(--t3)'}`;
      btn.textContent=isOpen?'✅':'❌';
      btn.onclick=()=>toggleSlotEditor(key,d,t,vehicle,btn);
      g.appendChild(btn);
    });
  });
}

async function toggleSlotEditor(key,date,time,vehicle,btn){
  const isOpen=!!slotData2[key];
  const newOpen=!isOpen;
  if(newOpen){slotData2[key]=true;}else{delete slotData2[key];}
  btn.textContent=newOpen?'✅':'❌';
  btn.style.background=newOpen?'var(--gl)':'var(--bg)';
  btn.style.borderColor=newOpen?'#5DCAA5':'transparent';
  btn.style.color=newOpen?'':'var(--t3)';
  try{await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'updateSlot',date:fmt2(date),time,vehicle,open:newOpen})});}catch(e){}
}
function slotPrevWeek(){slotWo--;loadSlotEditor();}
function slotNextWeek(){slotWo++;loadSlotEditor();}
</script>
</body>
</html>
